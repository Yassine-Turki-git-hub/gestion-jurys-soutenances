spring.application.name=service-soutenance
server.port=${SERVER_PORT:8082}

# --- H2 Local Database ---
spring.datasource.url=jdbc:h2:file:./data/soutenance-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# --- Feign clients ---
services.utilisateurs.url=${UTILISATEURS_SERVICE_URL:http://localhost:8081}
services.planification.url=${PLANIFICATION_SERVICE_URL:http://localhost:8083}

logging.level.com.soutenance.soutenance=INFO
